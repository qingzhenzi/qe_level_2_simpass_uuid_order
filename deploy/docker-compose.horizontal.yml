version: "3.9"

# 水平扩展示例: 3 个 API 实例 + nginx 负载均衡
# 前置条件: PostgreSQL + Redis 已在外部运行
# 使用: docker compose -f deploy/docker-compose.horizontal.yml up -d

services:
  api-1:
    image: qe_level_2_simpass_uuid:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      SERVER_PORT: "8080"
      PG_HOST: ${PG_HOST:-pg-host}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?}
      PG_DBNAME: ${PG_DBNAME:-sl_uuid}
      REDIS_URL: ${REDIS_URL:?}
      REDIS_PREFIX: ${REDIS_PREFIX:-app}
      LOG_LEVEL: info
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    networks:
      - backend
    restart: always

  api-2:
    image: qe_level_2_simpass_uuid:latest
    environment:
      SERVER_PORT: "8080"
      PG_HOST: ${PG_HOST:-pg-host}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?}
      PG_DBNAME: ${PG_DBNAME:-sl_uuid}
      REDIS_URL: ${REDIS_URL:?}
      REDIS_PREFIX: ${REDIS_PREFIX:-app}
      LOG_LEVEL: info
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    networks:
      - backend
    restart: always

  api-3:
    image: qe_level_2_simpass_uuid:latest
    environment:
      SERVER_PORT: "8080"
      PG_HOST: ${PG_HOST:-pg-host}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?}
      PG_DBNAME: ${PG_DBNAME:-sl_uuid}
      REDIS_URL: ${REDIS_URL:?}
      REDIS_PREFIX: ${REDIS_PREFIX:-app}
      LOG_LEVEL: info
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    networks:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    depends_on:
      - api-1
      - api-2
      - api-3
    restart: always

networks:
  backend:
    driver: bridge
